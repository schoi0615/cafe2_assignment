<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 카페 주문 시스템 - OOP 시각화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .interactive-node { transition: all 0.3s ease; }
        .active-node { transform: scale(1.05); box-shadow: 0 0 15px rgba(217, 119, 6, 0.6); border-width: 3px; }
        .pulse-badge { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-stone-100 min-h-screen text-stone-800 font-sans pb-12">

    <header class="bg-white border-b border-stone-200 py-6 text-center shadow-sm">
        <h1 class="text-2xl font-bold text-stone-900 tracking-tight">CAFE SIREN ORDER (OOP Simulator)</h1>
        <p class="text-sm text-stone-500 mt-1">객체 지향 설계 기반의 실시간 다형성 구동 웹앱</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 flex flex-col gap-6">
            
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h2 class="text-sm font-bold text-stone-400 tracking-wider uppercase mb-4">Class Inheritance Diagram</h2>
                <div class="flex flex-col items-center py-2">
                    <div id="node-Beverage" class="interactive-node bg-amber-700 text-white font-semibold px-6 py-3 rounded-xl border border-transparent text-center w-48 shadow-sm">
                        Beverage (Base)
                    </div>
                    <div class="h-6 w-1 bg-stone-300"></div>
                    <div class="w-3/4 h-1 bg-stone-300 rounded"></div>
                    <div class="flex justify-between w-full mt-2 gap-2">
                        <div id="node-Coffee" class="interactive-node bg-stone-700 text-white font-medium px-4 py-2.5 rounded-xl border border-transparent text-center flex-1 shadow-sm text-sm">
                            Coffee (Sub)
                        </div>
                        <div id="node-Tea" class="interactive-node bg-emerald-700 text-white font-medium px-4 py-2.5 rounded-xl border border-transparent text-center flex-1 shadow-sm text-sm">
                            Tea (Sub)
                        </div>
                        <div id="node-Smoothie" class="interactive-node bg-orange-500 text-white font-medium px-4 py-2.5 rounded-xl border border-transparent text-center flex-1 shadow-sm text-sm">
                            Smoothie (Sub)
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="flex border-b border-stone-200 bg-stone-50">
                    <button onclick="switchCategory('all')" id="tab-all" class="flex-1 py-4 text-center font-semibold border-b-2 border-amber-700 text-amber-800 text-sm">전체 메뉴</button>
                    <button onclick="switchCategory('Coffee')" id="tab-Coffee" class="flex-1 py-4 text-center font-semibold border-b-2 border-transparent text-stone-500 hover:text-stone-800 text-sm">커피</button>
                    <button onclick="switchCategory('Tea')" id="tab-Tea" class="flex-1 py-4 text-center font-semibold border-b-2 border-transparent text-stone-500 hover:text-stone-800 text-sm">티</button>
                    <button onclick="switchCategory('Smoothie')" id="tab-Smoothie" class="flex-1 py-4 text-center font-semibold border-b-2 border-transparent text-stone-500 hover:text-stone-800 text-sm">스무디</button>
                </div>
                <div id="menu-grid" class="p-6 grid grid-cols-2 gap-4 max-h-[480px] overflow-y-auto">
                </div>
            </section>
        </div>

        <div class="flex flex-col gap-6">
            <section class="bg-zinc-900 text-zinc-100 p-6 rounded-2xl shadow-xl border border-zinc-800 flex flex-col justify-between min-h-[260px]">
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xs font-bold text-amber-500 tracking-wider uppercase">OOP Polymorphism Monitor</h2>
                        <span id="monitor-badge" class="hidden bg-amber-500/20 text-amber-400 border border-amber-500/30 text-[10px] px-2 py-0.5 rounded font-mono pulse-badge">OVERRIDDEN</span>
                    </div>
                    <div class="space-y-3 font-mono text-xs">
                        <div>
                            <span class="text-zinc-500">Active Object:</span>
                            <p id="monitor-object" class="text-zinc-300 mt-0.5 font-sans text-sm">-</p>
                        </div>
                        <div>
                            <span class="text-zinc-500">Triggered Method:</span>
                            <p id="monitor-method" class="text-emerald-400 mt-0.5 font
