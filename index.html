<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOP 다형성 시각화 - 카페 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .node { cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .node:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-amber-50 flex flex-col items-center justify-center min-h-screen p-5 font-sans">

    <h1 class="text-3xl font-bold mb-2 text-amber-900">카페 음료 객체 지향 시스템</h1>
    <p class="text-amber-700 mb-10">클래스 노드를 클릭하여 다형성(오버라이딩) 결과를 확인해 보세요.</p>
    
    <div class="flex flex-col items-center mb-10 w-full max-w-4xl">
        <div id="beverage-node" class="node bg-amber-600 text-white px-8 py-4 rounded-xl mb-8 w-56 text-center text-xl font-semibold tracking-wide">
            Beverage (Base)
        </div>
        
        <div class="h-10 border-l-4 border-amber-300 mb-2"></div>
        <div class="w-3/4 border-t-4 border-amber-300 mb-8"></div>

        <div class="flex justify-between w-3/4 gap-4">
            <div id="coffee-node" class="node bg-stone-700 text-white px-6 py-4 rounded-xl w-40 text-center font-medium">
                Coffee
            </div>
            <div id="tea-node" class="node bg-emerald-600 text-white px-6 py-4 rounded-xl w-40 text-center font-medium">
                Tea
            </div>
            <div id="smoothie-node" class="node bg-orange-400 text-white px-6 py-4 rounded-xl w-40 text-center font-medium">
                Smoothie
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-2xl text-center border border-amber-100">
        <h2 class="text-xl font-semibold mb-4 text-amber-900">제조 과정 로그 (brew 메서드 호출)</h2>
        <p id="output-log" class="text-lg text-gray-700 bg-amber-50/50 p-6 rounded-xl border border-amber-200 min-h-[5rem] flex items-center justify-center break-keep">
            음료를 선택하면 제조 과정이 이곳에 출력됩니다.
        </p>
    </div>

    <script>
        // 1. Base Class: Beverage 설계
        class Beverage {
            constructor(name, basePrice, temperature = "HOT") {
                this.name = name;
                this.basePrice = basePrice;
                this.temperature = temperature;
            }
            brew() {
                return `[${this.temperature}] ${this.name}을(를) 기본 방식으로 제조합니다.`;
            }
        }

        // 2. Sub Class: Coffee (오버라이딩)
        class Coffee extends Beverage {
            constructor(name, basePrice, temperature = "HOT", shot = 2) {
                super(name, basePrice, temperature);
                this.shot = shot;
            }
            brew() {
                return `[오버라이딩] [${this.temperature}] ${this.name}: 에스프레소 ${this.shot}샷 추출 후 물/우유를 추가합니다.`;
            }
        }

        // 3. Sub Class: Tea (오버라이딩)
        class Tea extends Beverage {
            constructor(name, basePrice, temperature = "HOT", steepMin = 3) {
                super(name, basePrice, temperature);
                this.steepMin = steepMin;
            }
            brew() {
                return `[오버라이딩] [${this.temperature}] ${this.name}: 찻잎을 ${this.steepMin}분간 우려냅니다.`;
            }
        }

        // 4. Sub Class: Smoothie (오버라이딩)
        class Smoothie extends Beverage {
            constructor(name, basePrice, fruits) {
                super(name, basePrice, "ICE");
                this.fruits = fruits;
            }
            brew() {
                const fruitList = this.fruits.join(", ");
                return `[오버라이딩] [${this.temperature}] ${this.name}: ${fruitList}을(를) 블렌더로 갈아 제조합니다.`;
            }
        }

        // 인스턴스 생성 (과제 1의 main.py 테스트 케이스 활용)
        const baseBev = new Beverage("기본 음료", 3000);
        const myCoffee = new Coffee("바닐라라떼", 5500, "ICE", 3);
        const myTea = new Tea("얼그레이", 4000, "HOT", 4);
        const mySmoothie = new Smoothie("베리스무디", 5500, ["딸기", "블루베리", "라즈베리"]);

        const outputLog = document.getElementById("output-log");

        // 클릭 이벤트 연동 (다형성 작동 시각화)
        document.getElementById("beverage-node").addEventListener("click", () => {
            outputLog.innerText = baseBev.brew();
        });
        document.getElementById("coffee-node").addEventListener("click", () => {
            outputLog.innerText = myCoffee.brew();
        });
        document.getElementById("tea-node").addEventListener("click", () => {
            outputLog.innerText = myTea.brew();
        });
        document.getElementById("smoothie-node").addEventListener("click", () => {
            outputLog.innerText = mySmoothie.brew();
        });
    </script>
</body>
</html>
